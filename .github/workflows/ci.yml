name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          python3 -m py_compile config.py compute.py generate_dashboard.py
          python3 -m py_compile pull_data.py run_recon.py run_email_report.py
          python3 -m py_compile send_email.py fetch_amone_invoice.py

      - name: No hardcoded secrets check
        run: |
          if grep -Prn "(METABASE_PASSWORD|SMTP_PASSWORD)\s*=\s*[\"']" --include="*.py" .; then
            echo "ERROR: hardcoded secret detected"
            exit 1
          fi
          echo "OK: no hardcoded secrets"

  deploy:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ~/recon-dashboard && git pull && echo Deploy complete at $(date)"
